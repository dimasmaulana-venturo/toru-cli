name: Claude Manual Review

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to review'
        required: true
        type: string
      prompt:
        description: 'Review instruction for Claude'
        required: false
        default: 'Review the codebase. Focus on code quality, security, and best practices.'
        type: string
      review_run_id:
        description: 'Internal review_run UUID from the code-review service'
        required: false
        type: string

jobs:
  review:
    runs-on: self-hosted
    environment: claude-code
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 1

      - name: Inject Dynamic Framework Skill
        run: |
          FRAMEWORK="generic"
          if [ -f pubspec.yaml ]; then
            FRAMEWORK="flutter"
          elif [ -f go.mod ]; then
            FRAMEWORK="golang"
          elif [ -f package.json ]; then
            if grep -q '"react-native"' package.json 2>/dev/null || grep -q "'react-native'" package.json 2>/dev/null; then
              FRAMEWORK="react-native"
            elif grep -q '"react"' package.json 2>/dev/null || grep -q "'react'" package.json 2>/dev/null; then
              FRAMEWORK="react"
            else
              FRAMEWORK="node"
            fi
          elif find . -maxdepth 3 -name "*.kt" -print -quit | grep -q .; then
            FRAMEWORK="kotlin"
          elif find . -maxdepth 3 -name "*.swift" -print -quit | grep -q .; then
            FRAMEWORK="ios-swift"
          fi
          echo "Detected framework: $FRAMEWORK"

          SYSTEM_PROMPT=""

          CAVEMAN=$(curl -sf "http://localhost:8080/skills/caveman/SKILL.md" 2>/dev/null) || true
          if [ -n "$CAVEMAN" ]; then
            echo "Caveman rules fetched"
            SYSTEM_PROMPT="$CAVEMAN"
          fi

          FRAMEWORK_SKILL=$(curl -sf "http://localhost:8080/api/dynamic-skill?framework=$FRAMEWORK" 2>/dev/null) || true
          if [ -n "$FRAMEWORK_SKILL" ]; then
            echo "Framework skill fetched for: $FRAMEWORK"
            SYSTEM_PROMPT="${SYSTEM_PROMPT}"$'\n\n'"${FRAMEWORK_SKILL}"
          else
            echo "No framework skill available for $FRAMEWORK, skipping"
          fi

          LAPORAN=$(curl -sf "http://localhost:8080/skills/laporan/SKILL.md" 2>/dev/null) || true
          if [ -n "$LAPORAN" ]; then
            echo "Laporan rules fetched"
            SYSTEM_PROMPT="${SYSTEM_PROMPT}"$'\n\n'"${LAPORAN}"
          fi

          if [ -n "$SYSTEM_PROMPT" ]; then
            echo "APPEND_SYSTEM_PROMPT<<EOF" >> $GITHUB_ENV
            echo "$SYSTEM_PROMPT" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            echo "APPEND_SYSTEM_PROMPT set"
          fi

      - name: Run Claude Review
        id: claude_review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            ${{ inputs.prompt }}

            After completing the review, create a GitHub issue in this repository using the `gh` CLI.
            Issue title: "[Claude Review] ${{ inputs.branch }}"
            Label the issue with "claude-review" (create the label first if it doesn't exist: `gh label create claude-review --color 0E8A16 --description "Automated Claude review report" 2>/dev/null || true`).
            The issue body must be a single consolidated report in markdown format.
          claude_args: '--allowed-tools "Glob,Grep,LS,Read,Bash"'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          APPEND_SYSTEM_PROMPT: ${{ env.APPEND_SYSTEM_PROMPT }}

      - name: Resolve comment metadata
        id: comment_meta
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          # claude-code-action posts a comment on the triggering PR when run
          # in a PR context. For workflow_dispatch on a branch there is no PR,
          # so the action creates a GitHub issue instead. We look for the most
          # recently updated issue whose title matches our pattern, then grab
          # its first comment (the body is posted as comment #1 by github-actions bot).
          ISSUE_URL=$(gh issue list --label "claude-review" --state open --json url,title \
            --jq '[.[] | select(.title | startswith("[Claude Review] ${{ inputs.branch }}"))] | first | .url' 2>/dev/null || true)

          COMMENT_ID=""
          COMMENT_URL=""

          if [ -n "$ISSUE_URL" ]; then
            # Fetch the issue number from the URL.
            ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
            # The issue body is the first "comment" — use the issue itself (id comes from API).
            ISSUE_JSON=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUMBER}" 2>/dev/null || true)
            COMMENT_ID=$(echo "$ISSUE_JSON" | jq -r '.id // empty')
            COMMENT_URL="$ISSUE_URL"
          fi

          echo "comment_id=${COMMENT_ID}" >> $GITHUB_OUTPUT
          echo "comment_url=${COMMENT_URL}" >> $GITHUB_OUTPUT

      - name: Notify Completion
        if: always()
        env:
          CLAUDE_DONE_SECRET: ${{ secrets.CLAUDE_DONE_SECRET }}
        run: |
          COMMENT_ID="${{ steps.comment_meta.outputs.comment_id }}"
          COMMENT_URL="${{ steps.comment_meta.outputs.comment_url }}"
          REVIEW_RUN_ID="${{ inputs.review_run_id }}"

          PAYLOAD="{\"review_run_id\":\"${REVIEW_RUN_ID}\",\"repo\":\"${{ github.repository }}\",\"branch\":\"${{ inputs.branch }}\",\"status\":\"${{ job.status }}\",\"run_id\":${{ github.run_id }}"

          if [ -n "$COMMENT_ID" ]; then
            PAYLOAD="${PAYLOAD},\"pr_comment_id\":${COMMENT_ID}"
          fi
          if [ -n "$COMMENT_URL" ]; then
            PAYLOAD="${PAYLOAD},\"pr_comment_url\":\"${COMMENT_URL}\""
          fi

          PAYLOAD="${PAYLOAD}}"

          curl -sf -X POST "http://localhost:8080/webhook/manual-review-done" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $CLAUDE_DONE_SECRET" \
            -d "$PAYLOAD"
